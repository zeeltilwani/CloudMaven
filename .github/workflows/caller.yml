name: Call Reusable Workflow

on:
  push:
    branches:
      - develop
      - main

jobs:
  call-workflow:
    uses: zeeltilwani/cicd-workflows/.github/workflows/docker-ci.yml@v1.0.0

    with:
      image_name: zeeltilwani/cloudmaven
      tag: ${{ github.ref == 'refs/heads/develop' && format('staging-{0}', github.sha) || format('prod-{0}', github.run_number) }}

    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}