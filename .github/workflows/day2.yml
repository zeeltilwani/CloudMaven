name: Day2 CI Tasks

# ✅ Task 1: Trigger Configuration
on:
  pull_request:
  workflow_dispatch:

jobs:

  # ✅ Task 2: Build Job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build Step
        run: echo "Building application..."

  # ✅ Task 2: Test depends on Build
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:

      # ✅ Task 3: Print branch & commit
      - name: Print GitHub Context
        run: |
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"

      - name: Test Step
        run: echo "Running tests..."

  # ✅ Task 5: Docker Build & Push
  docker:
    runs-on: ubuntu-latest
    needs: test

    env:
      REGISTRY: docker.io
      IMAGE_NAME: zeeltilwani/myapp
      TAG: latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build --build-arg ENV=dev -t $REGISTRY/$IMAGE_NAME:$TAG .

      - name: Push Docker Image
        run: docker push $REGISTRY/$IMAGE_NAME:$TAG

      - name: Remove Local Image
        run: docker rmi $REGISTRY/$IMAGE_NAME:$TAG