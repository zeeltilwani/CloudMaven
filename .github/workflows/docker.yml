name: Docker CI Pipeline

on:
  push:

jobs:
  docker-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cloudmaven:latest .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cloudmaven:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/cloudmaven:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/cloudmaven:${{ github.sha }}