name: CI Pipeline

on:
  push:
    branches:
      - Day4

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t ci-cd-app .

      - name: Run Container
        run: docker run ci-cd-app
